AWSTemplateFormatVersion: "2010-09-09"
Description: "สหกรุ๊ปแฟร์ 30 – ECS Fargate + ALB"

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID to deploy into
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: Subnet IDs (at least 2, across different AZs)
  ImageUri:
    Type: String
    Description: ECR image URI (e.g. ACCOUNT.dkr.ecr.REGION.amazonaws.com/sahagroup-fair30:latest)
  DomainName:
    Type: String
    Default: ""
    Description: Optional domain name (e.g. fair30.sahagroup.com)

Resources:
  # ── ECR Repository ──
  EcrRepo:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: sahagroup-fair30
      ImageScanningConfiguration:
        ScanOnPush: true
      LifecyclePolicy:
        LifecyclePolicyText: |
          {"rules":[{"rulePriority":1,"description":"Keep last 5 images",
          "selection":{"tagStatus":"any","countType":"imageCountMoreThan","countNumber":5},
          "action":{"type":"expire"}}]}

  # ── CloudWatch Log Group ──
  LogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: /ecs/sahagroup-fair30
      RetentionInDays: 14

  # ── ECS Cluster ──
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: sahagroup-fair30
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT
      DefaultCapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 1
        - CapacityProvider: FARGATE_SPOT
          Weight: 1

  # ── Security Group ──
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 0.0.0.0/0

  EcsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ECS tasks security group
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3000
          ToPort: 3000
          SourceSecurityGroupId: !GetAtt AlbSg.GroupId

  # ── ALB ──
  Alb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: sahagroup-fair30-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSg
      Subnets: !Ref SubnetIds

  AlbTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: sahagroup-fair30-tg
      Port: 3000
      Protocol: HTTP
      TargetType: ip
      VpcId: !Ref VpcId
      HealthCheckPath: /
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 5
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref Alb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTargetGroup

  # ── IAM Role ──
  EcsExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sahagroup-fair30-ecs-execution-role
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ── Task Definition ──
  TaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: sahagroup-fair30
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt EcsExecutionRole.Arn
      ContainerDefinitions:
        - Name: app
          Image: !Ref ImageUri
          Essential: true
          PortMappings:
            - ContainerPort: 3000
              Protocol: tcp
          Environment:
            - Name: PORT
              Value: "3000"
            - Name: ADMIN_PASS
              Value: "sahagroup30"
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref LogGroup
              awslogs-region: !Ref AWS::Region
              awslogs-stream-prefix: ecs
          HealthCheck:
            Command:
              - CMD-SHELL
              - "curl -f http://localhost:3000/ || exit 1"
            Interval: 30
            Timeout: 5
            Retries: 3
            StartPeriod: 10

  # ── ECS Service ──
  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: sahagroup-fair30-service
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref TaskDefinition
      DesiredCount: 1
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: ENABLED
          SecurityGroups:
            - !GetAtt EcsSg.GroupId
          Subnets: !Ref SubnetIds
      LoadBalancers:
        - ContainerName: app
          ContainerPort: 3000
          TargetGroupArn: !Ref AlbTargetGroup
      HealthCheckGracePeriodSeconds: 60

Outputs:
  AlbDnsName:
    Description: ALB DNS name
    Value: !GetAtt Alb.DNSName
  EcrRepoUri:
    Description: ECR Repository URI
    Value: !GetAtt EcrRepo.RepositoryUri
