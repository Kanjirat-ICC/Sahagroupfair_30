AWSTemplateFormatVersion: "2010-09-09"
Description: "IAM Role สำหรับ GitHub Actions OIDC — Deploy to ECS"

Parameters:
  GitHubOrg:
    Type: String
    Default: Kanjirat-ICC
    Description: GitHub organization or username
  GitHubRepo:
    Type: String
    Default: Sahagroupfair_30
    Description: GitHub repository name

Resources:
  # ── IAM Role for GitHub Actions ──
  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: sahagroup-fair30-github-actions
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:*"
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryFullAccess
        - arn:aws:iam::aws:policy/AmazonECS_FullAccess
      Policies:
        - PolicyName: pass-role
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: iam:PassRole
                Resource: "*"
                Condition:
                  StringEquals:
                    iam:PassedToService: ecs-tasks.amazonaws.com

  # ── OIDC Provider for GitHub Actions ──
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

Outputs:
  RoleArn:
    Description: IAM Role ARN for GitHub Actions
    Value: !GetAtt GitHubActionsDeployRole.Arn
  RoleName:
    Description: IAM Role name
    Value: !Ref GitHubActionsDeployRole
